<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centrail — Diagnóstico y corrección de afinación de referencia</title>
<link rel="stylesheet" href="fonts/fonts.css?v=1.0.0">
<style>
  /* ── Tokens: estética de instrumento de banco de pruebas ──
     fondo grafito, tinta cálida serigrafiada, ámbar de aguja VU,
     cian de traza de osciloscopio */
  :root {
    --bg: #16181d;
    --panel: #1e2128;
    --panel-2: #24272f;
    --line: #33373f;
    --ink: #e9e5d9;
    --ink-dim: #9a968c;
    --amber: #f2a33c;
    --cyan: #5fd4c4;
    --red: #e06a5a;
    --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: "Archivo", -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 28px 16px 64px;
    background-image: radial-gradient(ellipse 80% 50% at 50% -10%, #21242c 0%, transparent 60%);
  }
  .rig { max-width: 720px; margin: 0 auto; }

  header {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px; margin-bottom: 22px;
  }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.04em; }
  h1 .num { color: var(--amber); font-family: var(--mono); font-weight: 500; }
  .plate {
    font-family: var(--mono); font-size: 10.5px; color: var(--ink-dim);
    letter-spacing: 0.12em; text-transform: uppercase; text-align: right;
  }

  .drop {
    border: 1.5px dashed var(--line);
    border-radius: 10px;
    background: var(--panel);
    padding: 42px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .drop:hover, .drop.over { border-color: var(--cyan); background: var(--panel-2); }
  .drop:focus-visible { outline: 2px solid var(--cyan); outline-offset: 3px; }
  .drop .big { font-size: 15.5px; margin-bottom: 6px; }
  .drop .fmt { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); letter-spacing: 0.06em; }
  input[type=file] { display: none; }

  /* ── Progreso honesto (§4.3): velo modal, etapa nombrada + porcentaje real, nunca spinner ── */
  .progress {
    display: none; position: fixed; inset: 0; z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
    background: rgba(22, 24, 29, 0.9); backdrop-filter: blur(2px);
  }
  .progress.on { display: flex; }
  .progress-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 34px 36px 30px; width: min(380px, 100%); text-align: center;
  }
  .ppercent {
    font-family: var(--mono); font-size: clamp(36px, 9vw, 48px); font-weight: 500;
    color: var(--amber); line-height: 1;
  }
  .ppercent.done { color: var(--cyan); }
  .ppercent.error { color: var(--red); }
  .pbar { height: 6px; background: var(--panel-2); border-radius: 3px; overflow: hidden; margin-top: 18px; }
  .pbar > div { height: 100%; width: 0%; background: var(--amber); transition: width .12s linear; }
  .pbar.done > div { background: var(--cyan); }
  .pbar.error > div { background: var(--red); width: 100% !important; }
  .plabel { font-family: var(--mono); font-size: 12px; color: var(--ink-dim); margin-top: 14px; }
  .plabel.error { color: var(--red); }
  .plocal-note { font-size: 11.5px; color: var(--ink-dim); margin-top: 16px; line-height: 1.5; }

  .result { display: none; margin-top: 26px; }
  .result.on { display: block; animation: rise .35s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .result.on { animation: none; } }

  .readout {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 26px 22px 20px; text-align: center; position: relative; overflow: hidden;
  }
  .readout::before {
    content: ""; position: absolute; inset: 0;
    background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 28px 28px; opacity: 0.12; pointer-events: none;
  }
  .hz {
    font-family: var(--mono); font-size: clamp(44px, 11vw, 68px); font-weight: 500;
    color: var(--amber); line-height: 1; text-shadow: 0 0 24px rgba(242,163,60,0.25); position: relative;
  }
  .hz small { font-size: 0.38em; color: var(--ink-dim); font-weight: 400; }
  .verdict { margin-top: 10px; font-size: 14px; position: relative; }
  .verdict b { color: var(--cyan); font-weight: 600; }
  .verdict .off { color: var(--red); }

  .honesty {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: var(--panel-2); border-left: 3px solid var(--amber);
    font-size: 13px; line-height: 1.5; text-align: left;
  }
  .honesty.low-conf { border-left-color: var(--red); }

  .dial-wrap { margin: 18px auto 4px; width: min(340px, 100%); position: relative; }
  .dial-cap {
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 10px; color: var(--ink-dim);
    margin-top: 4px; padding: 0 6px;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  @media (max-width: 540px) { .grid2 { grid-template-columns: 1fr; } }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; }
  .card h2 {
    font-family: var(--mono); font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 12px;
  }
  .card.full { grid-column: 1 / -1; }
  canvas { display: block; width: 100%; }

  .stat { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; font-size: 13.5px; }
  .stat + .stat { border-top: 1px solid var(--panel-2); }
  .stat .k { color: var(--ink-dim); }
  .stat .v { font-family: var(--mono); font-size: 13px; }
  .v.cy { color: var(--cyan); } .v.am { color: var(--amber); } .v.rd { color: var(--red); }

  .drift-note { font-size: 12.5px; color: var(--ink-dim); margin-top: 10px; line-height: 1.5; }
  .drift-note b { color: var(--red); font-weight: 600; }
  .drift-note b.ok { color: var(--cyan); }

  /* ── Corrección: selector de destino ── */
  .correct-card { margin-top: 20px; }
  .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .preset {
    font-family: var(--mono); font-size: 13px; letter-spacing: 0.04em;
    background: var(--panel-2); border: 1px solid var(--line); color: var(--ink);
    padding: 9px 16px; border-radius: 8px; cursor: pointer;
  }
  .preset:hover { border-color: var(--cyan); }
  .preset.active { border-color: var(--amber); color: var(--amber); background: rgba(242,163,60,0.08); }
  .preset.active:hover { border-color: var(--amber); }
  .free-freq { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-dim); }
  .free-freq input {
    width: 110px; font-family: var(--mono); font-size: 13px; background: var(--panel-2);
    border: 1px solid var(--line); color: var(--ink); border-radius: 8px; padding: 8px 10px;
    -moz-appearance: textfield;
  }
  .free-freq input::-webkit-outer-spin-button,
  .free-freq input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .free-freq input:focus { outline: 2px solid var(--cyan); outline-offset: 1px; }
  .shift-note { font-family: var(--mono); font-size: 11.5px; color: var(--ink-dim); margin: 10px 0 14px; }

  .preview-ab { margin: 4px 0 16px; }
  .preview-controls { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .preview-btn {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em;
    background: var(--panel-2); border: 1px solid var(--line); color: var(--ink);
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
  }
  .preview-btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .preview-btn:disabled { opacity: 0.4; cursor: default; }
  .blind-toggle { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--ink-dim); cursor: pointer; }
  .preview-players { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .play-btn {
    font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
    background: var(--panel-2); border: 1px solid var(--cyan); color: var(--cyan);
    padding: 10px 20px; border-radius: 8px; cursor: pointer; min-width: 64px;
  }
  .play-btn:hover { background: rgba(95,212,196,0.1); }
  .play-btn.playing { background: var(--cyan); color: #16181d; }
  .reveal-btn {
    font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.04em;
    background: none; border: 1px solid var(--line); color: var(--ink-dim);
    padding: 8px 14px; border-radius: 8px; cursor: pointer;
  }
  .reveal-btn:hover { border-color: var(--amber); color: var(--amber); }
  .reveal-text { font-family: var(--mono); font-size: 12px; color: var(--amber); }
  .go button {
    font-family: var(--mono); font-size: 13px; letter-spacing: 0.06em;
    background: var(--amber); border: none; color: #16181d; font-weight: 600;
    padding: 11px 22px; border-radius: 8px; cursor: pointer;
  }
  .go button:hover { filter: brightness(1.08); }
  .go button:disabled { opacity: 0.4; cursor: default; filter: none; }

  .corrected-result { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
  .downloads { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .downloads a {
    font-family: var(--mono); font-size: 12.5px; letter-spacing: 0.04em;
    border: 1px solid var(--cyan); color: var(--cyan); text-decoration: none;
    padding: 10px 18px; border-radius: 8px;
  }
  .downloads a:hover { background: rgba(95,212,196,0.1); }

  .again { margin-top: 20px; text-align: center; }
  .again button {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
    background: none; border: 1px solid var(--line); color: var(--ink);
    padding: 10px 22px; border-radius: 8px; cursor: pointer;
  }
  .again button:hover { border-color: var(--cyan); color: var(--cyan); }
  .again button:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }

  details { margin-top: 26px; border-top: 1px solid var(--line); padding-top: 14px; }
  summary { font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-dim); cursor: pointer; }
  details p { font-size: 13px; line-height: 1.65; color: var(--ink-dim); margin-top: 10px; max-width: 62ch; }
  details p b { color: var(--ink); font-weight: 600; }

  .err {
    display: none; margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: var(--panel-2); border-left: 3px solid var(--red);
  }
  .err.on { display: block; }
  .err-msg { font-size: 13px; color: var(--red); font-family: var(--mono); line-height: 1.5; }
  .err-copy {
    margin-top: 10px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
    background: none; border: 1px solid var(--line); color: var(--ink-dim);
    padding: 6px 12px; border-radius: 6px; cursor: pointer;
  }
  .err-copy:hover { border-color: var(--cyan); color: var(--cyan); }
  .err-copy.copied { border-color: var(--cyan); color: var(--cyan); }

  .lang-switch { display: flex; gap: 4px; margin-top: 8px; justify-content: flex-end; }
  .lang-switch button {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
    background: none; border: 1px solid var(--line); color: var(--ink-dim);
    padding: 3px 8px; border-radius: 6px; cursor: pointer; text-transform: uppercase;
  }
  .lang-switch button.active { border-color: var(--cyan); color: var(--cyan); }
</style>
</head>
<body>
<div class="rig">
  <header>
    <h1>Cent<span class="num">rail</span></h1>
    <div>
      <div class="plate" id="plate" data-i18n-html="header.subtitle"></div>
      <div class="lang-switch" id="langSwitch"></div>
    </div>
  </header>

  <div class="drop" id="drop" tabindex="0" role="button" data-i18n-aria-label="drop.aria">
    <div class="big" data-i18n="drop.title"></div>
    <div class="fmt" data-i18n="drop.formats"></div>
    <input type="file" id="file" accept="audio/*,.flac,.wav,.mp3,.ogg,.m4a">
  </div>
  <div class="err" id="err">
    <div class="err-msg" id="errMsg"></div>
    <button class="err-copy" id="errCopyBtn" type="button"></button>
  </div>

  <div class="progress" id="prog" role="status" aria-live="polite">
    <div class="progress-card">
      <div class="ppercent" id="ppercent">0%</div>
      <div class="pbar" id="pbar"><div id="pfill"></div></div>
      <div class="plabel" id="plabel"></div>
      <div class="plocal-note" data-i18n="progress.privacyNote"></div>
    </div>
  </div>

  <div class="result" id="result">
    <div class="readout">
      <div class="hz"><span id="hzval">—</span><small> Hz</small></div>
      <div class="verdict" id="verdict"></div>
      <div class="dial-wrap">
        <svg id="dial" viewBox="0 0 340 120" data-i18n-aria-label="dial.aria"></svg>
        <div class="dial-cap"><span>−50 ¢</span><span>0 ¢ = 440 Hz</span><span>+50 ¢</span></div>
      </div>
      <div id="honestyBox"></div>
    </div>

    <div class="grid2">
      <div class="card full">
        <h2 data-i18n="card.hist.title"></h2>
        <canvas id="hist" height="150"></canvas>
      </div>

      <div class="card">
        <h2 data-i18n="card.measurement.title"></h2>
        <div class="stat"><span class="k" data-i18n="card.measurement.ref"></span><span class="v am" id="s-ref">—</span></div>
        <div class="stat"><span class="k" data-i18n="card.measurement.dev"></span><span class="v am" id="s-cents">—</span></div>
        <div class="stat"><span class="k" data-i18n="card.measurement.unc"></span><span class="v" id="s-unc">—</span></div>
        <div class="stat"><span class="k" data-i18n="card.measurement.conf"></span><span class="v cy" id="s-conf">—</span></div>
        <div class="stat"><span class="k" data-i18n="card.measurement.frames"></span><span class="v" id="s-frames">—</span></div>
      </div>

      <div class="card">
        <h2 data-i18n="card.file.title"></h2>
        <div class="stat"><span class="k" data-i18n="card.file.name"></span><span class="v" id="s-name" style="max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</span></div>
        <div class="stat"><span class="k" data-i18n="card.file.dur"></span><span class="v" id="s-dur">—</span></div>
        <div class="stat"><span class="k" data-i18n="card.file.sr"></span><span class="v" id="s-sr">—</span></div>
        <div class="stat"><span class="k" data-i18n="card.file.ch"></span><span class="v" id="s-ch">—</span></div>
      </div>

      <div class="card full">
        <h2 data-i18n="card.drift.title"></h2>
        <canvas id="drift" height="110"></canvas>
        <div class="drift-note" id="driftnote"></div>
      </div>

      <div class="card full correct-card">
        <h2 data-i18n="correct.title"></h2>
        <div class="presets" id="presets">
          <button class="preset" data-hz="432">432 Hz</button>
          <button class="preset active" data-hz="440">440 Hz</button>
          <button class="preset" data-hz="442">442 Hz</button>
          <button class="preset" data-hz="444">444 Hz</button>
        </div>
        <div class="free-freq">
          <label for="freeHz" data-i18n="correct.freeLabel"></label>
          <input type="number" id="freeHz" step="0.1" min="200" max="880" placeholder="435">
          <span>Hz</span>
        </div>
        <div class="shift-note" id="shiftNote"></div>

        <div class="preview-ab">
          <div class="preview-controls">
            <button class="preview-btn" id="previewBtn" type="button" data-i18n="preview.button"></button>
            <label class="blind-toggle"><input type="checkbox" id="blindMode"><span data-i18n="preview.blindLabel"></span></label>
          </div>
          <div class="preview-players" id="previewPlayers" style="display:none">
            <button class="play-btn" id="playA">A</button>
            <button class="play-btn" id="playB">B</button>
            <button class="reveal-btn" id="revealBtn" data-i18n="preview.reveal"></button>
            <span class="reveal-text" id="revealText"></span>
          </div>
        </div>

        <div class="go"><button id="goBtn" data-i18n="correct.button"></button></div>

        <div class="corrected-result" id="correctedResult" style="display:none">
          <div class="stat"><span class="k" data-i18n="correct.resultRef"></span><span class="v cy" id="c-ref">—</span></div>
          <div class="stat"><span class="k" data-i18n="correct.resultDev"></span><span class="v cy" id="c-dev">—</span></div>
          <div id="levelNote"></div>
          <div class="downloads" id="downloads"></div>
        </div>
      </div>
    </div>

    <div class="again"><button id="again" data-i18n="again.button"></button></div>
  </div>

  <details>
    <summary data-i18n="howItMeasures.summary"></summary>
    <p data-i18n-html="howItMeasures.p1"></p>
    <p data-i18n-html="howItMeasures.p2"></p>
    <p data-i18n-html="howItMeasures.p3"></p>
    <p data-i18n-html="howItMeasures.p3b"></p>
    <p data-i18n-html="howItMeasures.p4"></p>
  </details>
</div>

<script type="module">
"use strict";
import { detectFormat } from "./engine/decode.mjs?v=1.0.0";
import { AVAILABLE_LOCALES, loadLocale, detectDefaultLocale, saveLocale, makeTranslator } from "./engine/i18n.mjs?v=1.0.0";

const APP_VERSION = "1.0.0"; // sincronizado con package.json — scripts/bump-cache-version.sh lo actualiza

const $ = id => document.getElementById(id);
const drop = $("drop"), fileIn = $("file"), prog = $("prog"), pbar = $("pbar"), pfill = $("pfill"),
      plabel = $("plabel"), result = $("result"), errBox = $("err"), errMsgEl = $("errMsg"),
      errCopyBtn = $("errCopyBtn"), goBtn = $("goBtn");
const previewBtn = $("previewBtn"), blindMode = $("blindMode"), previewPlayers = $("previewPlayers"),
      playA = $("playA"), playB = $("playB"), revealBtn = $("revealBtn"), revealText = $("revealText");

let worker = null;
let currentFileName = "";
let currentFileInfo = null; // { format, sizeBytes }
let lastDiagnosis = null;
let selectedTargetHz = 440;
let lastErrorDiagnostic = "";

// ── Previsualización A/B (§4.3) ──
let previewAudioCtx = null;
let previewBuffers = null; // { original: AudioBuffer, corrected: AudioBuffer }
let previewMap = null; // { A: "original"|"corrected", B: "original"|"corrected" }
let previewSource = null; // nodo en reproducción, para poder detenerlo

// ── i18n (§4.4): arquitectura lista para los 10 idiomas de v1.1 — agregar un
// idioma es sumar i18n/{code}.json + una entrada en engine/i18n.mjs. ──
let t = (key) => key; // fallback antes de cargar el diccionario

function applyStaticI18n() {
  document.title = t("meta.title");
  document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-html]").forEach(el => { el.innerHTML = t(el.dataset.i18nHtml); });
  document.querySelectorAll("[data-i18n-aria-label]").forEach(el => { el.setAttribute("aria-label", t(el.dataset.i18nAriaLabel)); });
}

async function setLocale(code) {
  const dict = await loadLocale(code);
  t = makeTranslator(dict);
  saveLocale(code);
  document.documentElement.lang = code;
  applyStaticI18n();
  renderLangSwitch(code);
  if (lastDiagnosis) { render(lastDiagnosis, currentFileName); updateShiftNote(); }
}

function renderLangSwitch(active) {
  const el = $("langSwitch");
  el.innerHTML = "";
  for (const { code, label } of AVAILABLE_LOCALES) {
    const btn = document.createElement("button");
    btn.textContent = code;
    btn.title = label;
    btn.className = code === active ? "active" : "";
    btn.addEventListener("click", () => setLocale(code));
    el.appendChild(btn);
  }
}

await setLocale(detectDefaultLocale());

function newWorker() {
  if (worker) worker.terminate();
  worker = new Worker(new URL("./workers/engine.worker.mjs?v=1.0.0", import.meta.url), { type: "module" });
  worker.onmessage = onWorkerMessage;
  worker.onerror = (e) => showError(t("error.workerError", { message: e.message }));
  return worker;
}

// Progreso honesto (§4.3): etapa nombrada + porcentaje real + tiempo restante
// estimado a partir de la velocidad medida en ESTA corrida (nunca inventado),
// reiniciado en cada cambio de etapa porque decodificar/analizar/corregir/codificar
// avanzan a velocidades muy distintas. Nunca spinner indeterminado.
let stageName = null, stageStart = 0;

function formatEta(seconds) {
  if (!isFinite(seconds) || seconds < 0) return null;
  if (seconds < 1) return t("progress.etaSeconds");
  const m = Math.floor(seconds / 60), s = Math.round(seconds % 60);
  return m > 0 ? t("progress.etaMinSec", { min: m, sec: String(s).padStart(2, "0") }) : t("progress.etaSec", { sec: s });
}

const ppercent = $("ppercent");

const ui = {
  progress(p, stage) {
    prog.classList.add("on");
    pbar.classList.remove("error");
    ppercent.classList.remove("error");
    plabel.classList.remove("error");
    const done = p >= 1;
    pbar.classList.toggle("done", done);
    ppercent.classList.toggle("done", done);
    pfill.style.width = (Math.max(0, Math.min(1, p)) * 100).toFixed(1) + "%";
    ppercent.textContent = (p * 100).toFixed(0) + "%";

    if (stage !== stageName) { stageName = stage; stageStart = performance.now(); }
    const elapsed = (performance.now() - stageStart) / 1000;
    let etaTxt = "";
    if (p > 0.03 && p < 0.995 && elapsed > 0.5) {
      const eta = formatEta(elapsed * (1 - p) / p);
      if (eta) etaTxt = t("progress.eta", { eta });
    }
    let label = "…";
    if (stage) {
      const stageKey = `progress.stage.${stage}`;
      const translated = t(stageKey);
      label = translated === stageKey ? stage : translated; // ya viene traducido (ej. "diagnóstico listo")
    }
    plabel.textContent = `${label}…${etaTxt}`;
  },
  error(label) {
    prog.classList.add("on");
    pbar.classList.add("error");
    ppercent.classList.add("error");
    plabel.classList.add("error");
    ppercent.textContent = "!";
    plabel.textContent = label;
  },
  hideProgress() { prog.classList.remove("on"); }
};

// Info de diagnóstico copiable (sin telemetría: nada se envía a ningún lado,
// solo se arma un texto para que el usuario lo pegue a mano en un Issue de
// GitHub si quiere reportar un problema).
function buildDiagnosticInfo(msg) {
  const lines = [
    `Centrail ${APP_VERSION}`,
    `Fecha: ${new Date().toISOString()}`,
    `Idioma: ${document.documentElement.lang}`,
    `Navegador: ${navigator.userAgent}`,
    `Error: ${msg}`,
  ];
  if (currentFileInfo) {
    lines.push(`Archivo: formato=${currentFileInfo.format}, tamaño=${(currentFileInfo.sizeBytes / 1e6).toFixed(1)}MB`);
  }
  if (lastDiagnosis) {
    lines.push(
      `Diagnóstico previo: ${lastDiagnosis.refHz.toFixed(2)}Hz, ${lastDiagnosis.sampleRate}Hz/${lastDiagnosis.bitDepth}-bit, ${lastDiagnosis.channels}ch, R=${(lastDiagnosis.R * 100).toFixed(0)}%`
    );
  }
  return lines.join("\n");
}

function showError(msg) {
  errMsgEl.textContent = msg;
  errBox.classList.add("on");
  // El velo de progreso marca el error en rojo brevemente (nunca oculta que algo
  // falló) y luego se retira para dejar ver el detalle + el botón de copiar —
  // si se quedara arriba, taparía el mensaje real para siempre (§4.3, honestidad).
  ui.error(t("progress.error"));
  setTimeout(() => ui.hideProgress(), 1200);
  lastErrorDiagnostic = buildDiagnosticInfo(msg);
  errCopyBtn.textContent = t("error.copyDiagnostic");
  errCopyBtn.classList.remove("copied");
}

errCopyBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(lastErrorDiagnostic);
    errCopyBtn.textContent = t("error.copied");
    errCopyBtn.classList.add("copied");
  } catch {
    // clipboard API puede fallar por permisos — igual mostramos el texto seleccionable
    errMsgEl.textContent = lastErrorDiagnostic;
  }
});

drop.addEventListener("click", () => fileIn.click());
drop.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileIn.click(); } });
["dragover", "dragenter"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
["dragleave", "drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", e => { const f = e.dataTransfer.files[0]; if (f) run(f); });
fileIn.addEventListener("change", () => { if (fileIn.files[0]) run(fileIn.files[0]); });
$("again").addEventListener("click", () => {
  result.classList.remove("on");
  fileIn.value = "";
  drop.style.display = "";
  drop.focus();
  $("correctedResult").style.display = "none";
  $("downloads").innerHTML = "";
});

// ── Selector de destino (presets + valor libre, §4.1) ──
const presetsEl = $("presets"), freeHzEl = $("freeHz");
presetsEl.addEventListener("click", e => {
  const btn = e.target.closest(".preset");
  if (!btn) return;
  [...presetsEl.children].forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedTargetHz = Number(btn.dataset.hz);
  freeHzEl.value = "";
  updateShiftNote();
});
freeHzEl.addEventListener("input", () => {
  const v = Number(freeHzEl.value);
  if (v > 0) {
    [...presetsEl.children].forEach(b => b.classList.remove("active"));
    selectedTargetHz = v;
    updateShiftNote();
  }
});

function updateShiftNote() {
  if (!lastDiagnosis) return;
  const shiftCents = 1200 * Math.log2(selectedTargetHz / lastDiagnosis.detectedRefHz);
  $("shiftNote").textContent = t("correct.shiftNote", {
    from: lastDiagnosis.detectedRefHz.toFixed(2),
    to: selectedTargetHz,
    shift: (shiftCents >= 0 ? "+" : "") + shiftCents.toFixed(1),
  });
}

goBtn.addEventListener("click", () => {
  if (!lastDiagnosis || !worker) return;
  goBtn.disabled = true;
  worker.postMessage({ cmd: "correct", targetHz: selectedTargetHz, detectedRefHz: lastDiagnosis.detectedRefHz });
});

function stopPreviewPlayback() {
  if (previewSource) {
    try { previewSource.stop(); } catch (e) { /* ya detenido */ }
    previewSource = null;
  }
  playA.classList.remove("playing");
  playB.classList.remove("playing");
}

function floatArraysToAudioBuffer(channelBuffers, sampleRate) {
  if (!previewAudioCtx) previewAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const nCh = channelBuffers.length;
  const len = channelBuffers[0].byteLength / 4;
  const buf = previewAudioCtx.createBuffer(nCh, len, sampleRate);
  for (let c = 0; c < nCh; c++) buf.copyToChannel(new Float32Array(channelBuffers[c]), c);
  return buf;
}

function playPreviewLabel(label) {
  stopPreviewPlayback();
  const which = previewMap[label]; // "original" | "corrected"
  const buf = previewBuffers[which];
  const src = previewAudioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(previewAudioCtx.destination);
  src.onended = () => { (label === "A" ? playA : playB).classList.remove("playing"); };
  src.start();
  previewSource = src;
  (label === "A" ? playA : playB).classList.add("playing");
}

previewBtn.addEventListener("click", () => {
  if (!lastDiagnosis || !worker) return;
  previewBtn.disabled = true;
  previewBtn.textContent = t("preview.buttonBusy");
  previewPlayers.style.display = "none";
  revealText.textContent = "";
  worker.postMessage({ cmd: "preview", targetHz: selectedTargetHz, detectedRefHz: lastDiagnosis.detectedRefHz });
});

playA.addEventListener("click", () => playPreviewLabel("A"));
playB.addEventListener("click", () => playPreviewLabel("B"));

revealBtn.addEventListener("click", () => {
  revealText.textContent = t(previewMap.A === "original" ? "preview.revealed.aOriginal" : "preview.revealed.bOriginal");
});

async function run(file) {
  errBox.classList.remove("on");
  result.classList.remove("on");
  $("correctedResult").style.display = "none";
  $("downloads").innerHTML = "";
  stopPreviewPlayback();
  previewBuffers = null;
  previewMap = null;
  previewPlayers.style.display = "none";
  revealText.textContent = "";
  currentFileName = file.name;
  ui.progress(0.01, "cargando");

  const format = detectFormat(file.name);
  currentFileInfo = { format, sizeBytes: file.size };
  if (format === "aiff" || format === "unknown") {
    showError(t("error.unsupportedFormat", { format }));
    return;
  }

  const w = newWorker();

  try {
    if (format === "flac" || format === "wav") {
      const bytes = await file.arrayBuffer();
      w.postMessage({ cmd: "diagnose", fileName: file.name, format, bytes }, [bytes]);
    } else {
      // mp3/ogg/m4a: sin decodificador propio — decodeAudioData UNA vez, misma
      // decodificación se reutiliza para medir y corregir (tubería unificada, §3).
      ui.progress(0.05, "decodificando");
      const ac = new (window.AudioContext || window.webkitAudioContext)();
      const arr = await file.arrayBuffer();
      const audioBuffer = await ac.decodeAudioData(arr);
      ac.close();
      const channelData = [];
      for (let c = 0; c < audioBuffer.numberOfChannels; c++) channelData.push(audioBuffer.getChannelData(c).slice());
      const buffers = channelData.map(a => a.buffer);
      w.postMessage(
        { cmd: "diagnose", fileName: file.name, format, decoded: { channelData: buffers, sampleRate: audioBuffer.sampleRate, bitDepth: 32 } },
        buffers
      );
    }
    drop.style.display = "none";
  } catch (e) {
    showError(t("error.loadFailed", { message: e && e.message ? e.message : e }));
  }
}

function onWorkerMessage(ev) {
  const msg = ev.data;
  if (msg.type === "progress") {
    ui.progress(msg.pct, msg.stage);
  } else if (msg.type === "diagnosis") {
    ui.progress(1, t("progress.diagnosisReady"));
    ui.hideProgress();
    lastDiagnosis = msg;
    render(msg, currentFileName);
    updateShiftNote();
  } else if (msg.type === "corrected") {
    ui.progress(1, t("progress.correctionReady"));
    ui.hideProgress();
    renderCorrected(msg);
    goBtn.disabled = false;
  } else if (msg.type === "preview") {
    previewBtn.disabled = false;
    previewBtn.textContent = t("preview.button");
    previewBuffers = {
      original: floatArraysToAudioBuffer(msg.original, msg.sampleRate),
      corrected: floatArraysToAudioBuffer(msg.corrected, msg.sampleRate),
    };
    // orden a ciegas: sortea qué lado (A/B) toca cada versión si el toggle está activo
    const swap = blindMode.checked && Math.random() < 0.5;
    previewMap = swap ? { A: "corrected", B: "original" } : { A: "original", B: "corrected" };
    previewPlayers.style.display = "flex";
  } else if (msg.type === "error") {
    showError(t("error.processFailed", { message: msg.message }));
    goBtn.disabled = false;
    previewBtn.disabled = false;
    previewBtn.textContent = t("preview.button");
  }
}

function render(r, name) {
  $("hzval").textContent = r.refHz.toFixed(2);
  const absDev = Math.abs(r.offset);
  // Confianza real (§3, repetibilidad empírica): se basa en cuánto coincide la medición
  // entre dos subconjuntos de ventanas independientes, no en la consistencia tonal (R) —
  // R tiene un techo físico ~20-25% en música real (vibrato, inarmonicidad de piano) que
  // nada tiene que ver con si la medición es repetible.
  const lowConf = r.unc > 4;
  const medConf = !lowConf && r.unc > 1.5;
  const v = $("verdict");
  const dir = t(r.offset > 0 ? "verdict.dir.high" : "verdict.dir.low");
  const cents = t("verdict.centsPhrase", {
    n: Math.abs(r.offset).toFixed(1),
    dir: t(r.offset > 0 ? "verdict.centsPhrase.above" : "verdict.centsPhrase.below"),
  });
  if (absDev < 3) {
    v.innerHTML = t(lowConf ? "verdict.inTune.lowConf" : "verdict.inTune.confident");
  } else if (absDev < 10) {
    v.innerHTML = t(lowConf ? "verdict.slight.lowConf" : "verdict.slight.confident", { dir, cents });
  } else {
    v.innerHTML = t(lowConf ? "verdict.clear.lowConf" : "verdict.clear.confident", { dir, cents });
  }

  // Honestidad (§4.3): una línea esencial, sin sobre-explicar — el detalle vive en "Cómo mide".
  const honestyBox = $("honestyBox");
  honestyBox.innerHTML = "";
  if (lowConf) {
    honestyBox.innerHTML = `<div class="honesty low-conf">${t("honesty.lowConf", { unc: r.unc.toFixed(1) })}</div>`;
  } else if (absDev < 3 && r.maxDrift < 3) {
    honestyBox.innerHTML = `<div class="honesty">${t("honesty.alreadyTuned")}</div>`;
  }

  $("s-ref").textContent = r.refHz.toFixed(2) + " Hz";
  $("s-cents").textContent = (r.offset >= 0 ? "+" : "") + r.offset.toFixed(1) + " ¢";
  const uncEl = $("s-unc");
  uncEl.textContent = r.unc.toFixed(1) + " ¢";
  uncEl.className = "v " + (lowConf ? "rd" : medConf ? "am" : "cy");
  // Umbrales de R recalibrados (§3, hallazgo 8 jul): el techo real en música es ~20-25%
  // (incluso piano solo perfectamente afinado da R≈20% por inarmonicidad natural) — los
  // umbrales viejos (0.35/0.15) hacían leer casi todo material real como "media"/"baja".
  // Referencias de campo: piano solo ≈20%, piano+voz ≈5-11%, mezcla percusiva ≈8%.
  const confEl = $("s-conf");
  confEl.textContent = (r.R * 100).toFixed(0) + " %";
  confEl.className = "v " + (r.R > 0.15 ? "cy" : r.R > 0.05 ? "am" : "rd");
  $("s-frames").textContent = String(r.nFrames);
  $("s-name").textContent = name;
  $("s-name").title = name;
  const m = Math.floor(r.durationSec / 60), s = Math.round(r.durationSec % 60);
  $("s-dur").textContent = m + ":" + String(s).padStart(2, "0");
  $("s-sr").textContent = (r.sampleRate / 1000).toFixed(1) + " kHz / " + r.bitDepth + "-bit";
  $("s-ch").textContent = r.channels === 1 ? t("card.file.mono") : r.channels === 2 ? t("card.file.stereo") : t("card.file.channels", { n: r.channels });

  drawDial(r.offset);
  drawHist(r.hist, r.offset);
  drawDrift(r.segs, r.offset);

  result.classList.add("on");
}

function renderCorrected(msg) {
  $("correctedResult").style.display = "block";
  $("c-ref").textContent = msg.after.refHz.toFixed(2) + " Hz";
  const dev = 1200 * Math.log2(msg.after.refHz / selectedTargetHz);
  $("c-dev").textContent = (dev >= 0 ? "+" : "") + dev.toFixed(2) + " ¢";

  const levelEl = $("levelNote");
  if (msg.levelNote) {
    const why = t(msg.levelNote.reason === "recorte" ? "honesty.levelReason.clip" : "honesty.levelReason.original");
    levelEl.innerHTML = `<div class="honesty">${t("honesty.levelReduced", { db: msg.levelNote.reductionDb.toFixed(1), reason: why })}</div>`;
  } else {
    levelEl.innerHTML = "";
  }

  const dl = $("downloads");
  dl.innerHTML = "";
  for (const f of msg.files) {
    const blob = new Blob([f.bytes], { type: f.mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = f.name;
    a.textContent = t("correct.download", { name: f.name });
    dl.appendChild(a);
  }
}

/* ── Dial de aguja ── */
function drawDial(offset) {
  const svg = $("dial");
  const cx = 170, cy = 118, rad = 100;
  const clamp = Math.max(-50, Math.min(50, offset));
  const ang = (clamp / 50) * (Math.PI / 3); // 0 = vertical (centrado), ±60° en los extremos
  let ticks = "";
  for (let c = -50; c <= 50; c += 10) {
    const a = (c / 50) * (Math.PI / 3);
    const r1 = c === 0 ? rad - 16 : rad - 9;
    ticks += tick(cx, cy, a, r1, rad, c === 0);
  }
  function tick(cx, cy, a, r1, r2, major) {
    const x1 = cx + Math.sin(a) * r1, y1 = cy - Math.cos(a) * r1;
    const x2 = cx + Math.sin(a) * r2, y2 = cy - Math.cos(a) * r2;
    return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${major ? "var(--cyan)" : "var(--line)"}" stroke-width="${major ? 2 : 1.2}"/>`;
  }
  const nx = cx + Math.sin(ang) * (rad - 20), ny = cy - Math.cos(ang) * (rad - 20);
  svg.innerHTML = `
    <path d="M ${cx - Math.sin(Math.PI/3)*rad} ${cy - Math.cos(Math.PI/3)*rad}
             A ${rad} ${rad} 0 0 1 ${cx + Math.sin(Math.PI/3)*rad} ${cy - Math.cos(Math.PI/3)*rad}"
          fill="none" stroke="var(--line)" stroke-width="1.5"/>
    ${ticks}
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}"
          stroke="var(--amber)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="5" fill="var(--amber)"/>`;
}

/* ── Histograma ── */
function drawHist(hist, offset) {
  const NBINS = hist.length;
  const cv = $("hist");
  const W = cv.clientWidth || 640, H = 150;
  const dpr = window.devicePixelRatio || 1;
  cv.width = W * dpr; cv.height = H * dpr;
  const g = cv.getContext("2d");
  g.scale(dpr, dpr);
  g.clearRect(0, 0, W, H);
  const css = getComputedStyle(document.documentElement);
  const cyan = css.getPropertyValue("--cyan").trim();
  const amber = css.getPropertyValue("--amber").trim();
  const line = css.getPropertyValue("--line").trim();
  const dim = css.getPropertyValue("--ink-dim").trim();

  let max = 0;
  for (const v of hist) if (v > max) max = v;
  if (max <= 0) max = 1;
  const pad = 6, baseY = H - 18;
  const bw = (W - pad * 2) / NBINS;

  const zeroX = pad + (49.5 + 0.5) * bw;
  g.strokeStyle = line; g.setLineDash([3, 3]);
  g.beginPath(); g.moveTo(zeroX, 4); g.lineTo(zeroX, baseY); g.stroke();
  g.setLineDash([]);

  for (let i = 0; i < NBINS; i++) {
    const h = (hist[i] / max) * (baseY - 10);
    g.fillStyle = cyan;
    g.globalAlpha = 0.9;
    g.fillRect(pad + i * bw, baseY - h, Math.max(1, bw - 1), h);
  }
  g.globalAlpha = 1;

  const estX = pad + (offset + 49.5 + 0.5) * bw;
  g.strokeStyle = amber; g.lineWidth = 2;
  g.beginPath(); g.moveTo(estX, 2); g.lineTo(estX, baseY); g.stroke();

  g.fillStyle = dim; g.font = "10px IBM Plex Mono, monospace";
  g.textAlign = "left"; g.fillText("−50 ¢", pad, H - 4);
  g.textAlign = "center"; g.fillText("0", zeroX, H - 4);
  g.textAlign = "right"; g.fillText("+50 ¢", W - pad, H - 4);
}

/* ── Curva de drift ── */
function drawDrift(segs, globalOff) {
  const cv = $("drift");
  const W = cv.clientWidth || 640, H = 110;
  const dpr = window.devicePixelRatio || 1;
  cv.width = W * dpr; cv.height = H * dpr;
  const g = cv.getContext("2d");
  g.scale(dpr, dpr);
  g.clearRect(0, 0, W, H);
  const css = getComputedStyle(document.documentElement);
  const cyan = css.getPropertyValue("--cyan").trim();
  const amber = css.getPropertyValue("--amber").trim();
  const line = css.getPropertyValue("--line").trim();
  const dim = css.getPropertyValue("--ink-dim").trim();

  const valid = segs.filter(s => s);
  let span = 5;
  for (const s of valid) span = Math.max(span, Math.abs(s.off - globalOff) * 1.4);
  span = Math.min(span, 50);
  const padL = 44, padR = 10, padT = 10, padB = 20;
  const y = off => padT + (1 - ((off - globalOff) + span) / (2 * span)) * (H - padT - padB);
  const x = i => padL + (i + 0.5) / segs.length * (W - padL - padR);

  g.strokeStyle = line; g.setLineDash([3, 3]);
  g.beginPath(); g.moveTo(padL, y(globalOff)); g.lineTo(W - padR, y(globalOff)); g.stroke();
  g.setLineDash([]);
  g.fillStyle = dim; g.font = "10px IBM Plex Mono, monospace"; g.textAlign = "left";
  g.fillText((globalOff >= 0 ? "+" : "") + globalOff.toFixed(1) + "¢", 4, y(globalOff) + 3);
  g.fillText("+" + span.toFixed(0) + "¢", 4, padT + 4);
  g.fillText("−" + span.toFixed(0) + "¢", 4, H - padB);

  g.strokeStyle = amber; g.lineWidth = 1.6;
  g.beginPath();
  let started = false;
  segs.forEach((s, i) => {
    if (!s) return;
    const px = x(i), py = y(s.off);
    if (!started) { g.moveTo(px, py); started = true; } else g.lineTo(px, py);
  });
  g.stroke();
  segs.forEach((s, i) => {
    if (!s) return;
    g.fillStyle = s.R > 0.1 ? cyan : dim;
    g.beginPath(); g.arc(x(i), y(s.off), 3.2, 0, Math.PI * 2); g.fill();
  });

  g.fillStyle = dim; g.textAlign = "center";
  g.fillText(t("card.drift.start"), x(0), H - 6);
  g.fillText(t("card.drift.end"), x(segs.length - 1), H - 6);

  let maxDrift = 0;
  for (const s of valid) maxDrift = Math.max(maxDrift, Math.abs(s.off - globalOff));
  const note = $("driftnote");
  const driftKey = maxDrift < 3 ? "card.drift.low" : maxDrift < 10 ? "card.drift.mid" : "card.drift.high";
  note.innerHTML = t(driftKey, { n: maxDrift.toFixed(1) });
}
</script>
