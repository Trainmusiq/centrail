name: Tests

# Corre en cada push y PR a main — un test rojo debe verse ANTES de que
# GitHub Pages herede el deploy (el deploy de Pages no depende de este
# workflow, así que esto es un gate informativo: falla visible, no bloqueo
# automático del deploy salvo que se configure branch protection aparte).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Correr toda la batería de tests
        run: npm test
